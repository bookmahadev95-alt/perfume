<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Perfume Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f0f;color:#fff}
.marquee{background:#000;color:#00ffae;padding:10px;overflow:hidden;white-space:nowrap}
.marquee span{display:inline-block;padding-left:100%;animation:scroll 12s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
header{text-align:center;padding:15px;font-size:26px;font-weight:600}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:15px;padding:20px}
.card{background:#1a1a1a;padding:12px;border-radius:12px;text-align:center}
button{background:#00ffae;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;margin:4px}
.orderPage{display:none;padding:20px}
input,select{width:100%;padding:10px;margin:8px 0;border:none;border-radius:6px}
</style>
</head>
<body>

<div class="marquee"><span>🔥 Luxury Perfume Sale | Buy 2 Get 1 Free 🔥</span></div>
<header>Luxury Perfume Store</header>

<section id="productPage" class="products"></section>

<section id="orderPage" class="orderPage">
<h2>💳 Complete Your Order</h2>
<form onsubmit="submitForm(event)">
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" required>
<input id="address" placeholder="Full Address" required>
<input id="city" placeholder="City" required>
<input id="pincode" placeholder="Pincode" required>
<input id="selectedProduct" readonly>
<input id="selectedQty" readonly>
<button type="submit">Confirm Order (COD)</button>
</form>
</section>

<script>
let perfumes=["Royal Oud","Midnight Musk","Fresh Citrus","Dark Night","Ocean Breeze","Golden Spice","Royal Rose","Ice Cool","Black Oud","Silver Mist"];
let container=document.getElementById('productPage');

perfumes.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<h3>${p}</h3>
<select id="q${i}"><option>1</option><option>2</option></select>
<button onclick="openForm('${p}','q${i}')">Order COD</button>
</div>`;
});

function openForm(product,qtyId){
let qty=document.getElementById(qtyId).value;
document.getElementById('productPage').style.display='none';
document.getElementById('orderPage').style.display='block';
document.getElementById('selectedProduct').value=product;
document.getElementById('selectedQty').value=qty;
window.scrollTo(0,0);
}

function submitForm(e){
e.preventDefault();
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let city=document.getElementById('city').value;
let pincode=document.getElementById('pincode').value;
let product=document.getElementById('selectedProduct').value;
let qty=document.getElementById('selectedQty').value;
let number="91XXXXXXXXXX";
let msg=`COD Order:%0AName:${name}%0APhone:${phone}%0AAddress:${address}%0ACity:${city}%0APincode:${pincode}%0AProduct:${product}%0AQty:${qty}`;
window.open(`https://wa.me/${number}?text=${msg}`,'_blank');
}
</script>

</body>
</html>
