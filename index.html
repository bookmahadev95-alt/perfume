<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Perfume Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f0f;color:#fff}
.marquee{background:#000;color:#00ffae;padding:10px;overflow:hidden;white-space:nowrap}
.marquee span{display:inline-block;padding-left:100%;animation:scroll 10s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
header{text-align:center;padding:15px;font-size:26px;font-weight:600}
.hero{text-align:center;padding:40px 20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#1a1a1a;padding:15px;border-radius:12px;text-align:center;position:relative}
.stock{position:absolute;top:10px;left:10px;background:red;padding:5px 10px;border-radius:6px;font-size:12px}
.card img{width:100%;border-radius:10px}
.price{margin:10px 0}
.old{text-decoration:line-through;color:#888}
.new{color:#00ffae;font-weight:600}
button{background:#00ffae;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;margin:5px}
select{padding:8px;border-radius:6px;margin-top:5px}
.track{background:#111;padding:20px;margin:20px;border-radius:12px}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:6px}
footer{text-align:center;padding:20px;color:#777}
</style>
</head>
<body>

<div class="marquee"><span>🔥 Luxury Perfume Sale | Buy 2 Get 1 Free | Limited Time Offer 🔥</span></div>

<header>Luxury Perfume</header>

<section class="hero">
<h1>🔥 Premium Combo Offers</h1>
</section>

<section class="products">

<div class="card"><div class="stock">Only 5 Left</div><img src="https://images.unsplash.com/photo-1594035910387-fea47794261f"><h3>Royal Oud</h3><div class="price"><span class="old">₹1999</span> <span class="new">₹999</span></div><select id="q1"><option>1</option><option>2</option></select><button onclick="quickOrder('Royal Oud','q1')">Buy Now</button><button onclick="payNow('Royal Oud')">Pay Online</button></div>

<div class="card"><div class="stock">Only 4 Left</div><img src="https://images.unsplash.com/photo-1615634262417-9f0c8c88c6c3"><h3>Midnight Musk</h3><div class="price"><span class="old">₹1899</span> <span class="new">₹899</span></div><select id="q2"><option>1</option><option>2</option></select><button onclick="quickOrder('Midnight Musk','q2')">Buy Now</button><button onclick="payNow('Midnight Musk')">Pay Online</button></div>

</section>

<section class="track">
<h2>📦 Track Your Order</h2>
<input id="trackId" placeholder="Enter Order ID">
<button onclick="trackOrder()">Track Order</button>
<p id="status"></p>
</section>

<footer>🚚 Free Delivery | 💵 COD + Online Payment Available</footer>

<script>
function quickOrder(product, qtyId){
let qty=document.getElementById(qtyId).value;
let number="91XXXXXXXXXX";
let msg=`Order:%0AProduct:${product}%0AQuantity:${qty}`;
window.open(`https://wa.me/${number}?text=${msg}`,'_blank');
}

function payNow(product){
alert("Redirecting to payment gateway for "+product);
window.open("https://rzp.io/l/demo123","_blank");
}

function trackOrder(){
let id=document.getElementById('trackId').value;
if(id==""){
document.getElementById('status').innerText="Enter valid Order ID";
}else{
document.getElementById('status').innerText="Your order is Out for Delivery 🚚";
}
}
</script>

</body>
</html>
