<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Perfume Store | 2-Column Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --accent: #00ffae; --dark: #0f0f0f; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: linear-gradient(135deg, #0f0f0f, #1c1c1c); color:#fff; overflow-x:hidden; }

        /* Announcement Bar */
        .marquee { background:#000; color:var(--accent); padding:10px; overflow:hidden; white-space:nowrap; border-bottom:1px solid var(--gold); }
        .marquee span { display:inline-block; animation:scroll 15s linear infinite; font-weight:600; font-size: 14px; }
        @keyframes scroll { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }

        header { text-align:center; padding:20px 10px 5px; font-size:28px; font-weight:600; color:var(--gold); letter-spacing:2px; text-transform: uppercase; }
        
        /* Trust Badges */
        .trust-badges { 
            display: flex; justify-content: space-around; padding: 10px 5px; 
            background: rgba(255,255,255,0.05); margin-bottom: 5px;
        }
        .badge-item { text-align: center; font-size: 9px; font-weight: 600; color: #ccc; }
        .badge-item span { display: block; font-size: 16px; color: var(--gold); }

        .timer { text-align:center; background:#ff4d4d; padding:6px; font-weight:600; font-size:12px; }

        .section-title { text-align:center; margin:20px 0 10px; font-size:1.2rem; color:var(--gold); text-transform:uppercase; }

        /* --- FIXED 2-PRODUCT ROW LAYOUT --- */
        .products { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Har row mein 2 products */
            gap: 10px; 
            padding: 10px; 
            max-width: 900px; 
            margin: auto; 
        }

        .card { 
            background:rgba(255,255,255,0.03); 
            border:1px solid rgba(212, 175, 55, 0.2); 
            padding:10px; 
            border-radius:12px; 
            text-align:center; 
            position:relative;
        }
        .card img { width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom: 5px; }
        .offer-tag { position:absolute; top:5px; right:5px; background:var(--gold); color:#000; padding:2px 5px; font-size:8px; font-weight:bold; border-radius:3px; }
        
        .price { margin:5px 0; }
        .old { text-decoration:line-through; color:#888; font-size:10px; }
        .new { color:var(--accent); font-weight:600; font-size:15px; display: block; }
        .urgency { color:#ff4d4d; font-size:9px; font-weight:600; margin-bottom:8px; }

        select { width:100%; padding:8px; margin-bottom:8px; border-radius:6px; border:none; background:#222; color:#fff; font-size: 12px; }
        button { 
            background:linear-gradient(45deg, var(--gold), #f3e092); border:none; padding:10px; 
            border-radius:8px; cursor:pointer; width:100%; font-weight:700; color:#000; font-size: 12px;
        }

        /* Checkout Page */
        .orderPage { display:none; padding:20px; max-width:500px; margin:auto; }
        input { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid #333; background:#222; color:#fff; }

        /* Sale Popup */
        .sale-popup {
            position: fixed; bottom: 20px; left: 20px; background: #fff; color: #000;
            padding: 10px 15px; border-radius: 12px; display: none; z-index: 1000; font-size: 12px;
            border-left: 5px solid var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .review-track { display:flex; overflow-x:auto; gap:10px; padding:15px; }
        .review-box { min-width:200px; background:#1a1a1a; padding:10px; border-radius:10px; font-size:11px; }
    </style>
</head>
<body>

    <div class="marquee">
        <span>🔥 FREE SHIPPING | CASH ON DELIVERY | ALL INDIA DELIVERY 🔥</span>
    </div>

    <header>Luxe Aroma</header>

    <div class="trust-badges">
        <div class="badge-item"><span>🚚</span>FREE SHIPPING</div>
        <div class="badge-item"><span>💵</span>COD AVAILABLE</div>
        <div class="badge-item"><span>🇮🇳</span>PAN INDIA</div>
    </div>

    <div class="timer">⏱️ Discount Ends: <span id="countdown">10:00</span></div>

    <div id="homePage">
        <h2 class="section-title">🧴 Best Sellers</h2>
        <section id="productPage" class="products"></section>

        <h2 class="section-title">🎁 Exclusive Combos</h2>
        <section id="comboPage" class="products"></section>
    </div>

    <section id="orderPage" class="orderPage">
        <button style="width:auto; padding:5px 15px; background:none; border:1px solid var(--gold); color:var(--gold); margin-bottom:15px;" onclick="goBack()">← Back</button>
        <h2 style="margin-bottom:10px; color: var(--gold);">Complete Order</h2>
        <div style="background:rgba(212, 175, 55, 0.1); padding:15px; border-radius:12px; border: 1px dashed var(--gold); margin-bottom:20px;">
            <p id="selectedItemName" style="font-weight:bold;"></p>
            <p id="totalDisplay" style="font-size:20px; color:var(--accent); font-weight: bold;"></p>
            <p style="font-size: 11px; color: #aaa;">Delivery: FREE | Mode: COD</p>
        </div>

        <form onsubmit="sendToWhatsApp(event)">
            <input id="userName" type="text" placeholder="Full Name" required>
            <input id="userPhone" type="tel" placeholder="Mobile Number" pattern="[0-9]{10}" required>
            <input id="userAddress" type="text" placeholder="Full Address" required>
            <input id="userCity" type="text" placeholder="City" required>
            <input id="userPin" type="number" placeholder="Pincode" required>
            <button type="submit">Order Confirm Karein (COD)</button>
        </form>
    </section>

    <div id="salePopup" class="sale-popup"></div>

    <script>
        const perfumes = [
            {name:"Royal Oud", price:799, old:1999}, {name:"Midnight Musk", price:899, old:2199},
            {name:"Ocean Blue", price:749, old:1899}, {name:"Fresh Citrus", price:699, old:1799},
            {name:"Dark Night", price:999, old:2499}, {name:"Golden Sand", price:849, old:2099},
            {name:"Silver Mist", price:699, old:1699}, {name:"Black Leather", price:1099, old:2699},
            {name:"White Jasmine", price:799, old:1899}, {name:"Velvet Rose", price:899, old:2299}
        ];

        const combos = [
            {name:"Couple Special", price:1299, old:2999}, {name:"Luxury Trio", price:1599, old:3999},
            {name:"Party Pack", price:1999, old:5499}, {name:"Gifting Kit", price:1399, old:2899},
            {name:"Travel Mini", price:999, old:2499}, {name:"His & Her", price:1449, old:3299},
            {name:"Weekend Vibes", price:1199, old:2599}, {name:"Office Pack", price:1699, old:4299},
            {name:"Royal Collection", price:1499, old:3499}, {name:"Ultimate Gift", price:2499, old:5999}
        ];

        let sProduct = "", sPrice = 0, sQty = 1;

        function init() {
            const pDiv = document.getElementById('productPage');
            perfumes.forEach((p, i) => {
                pDiv.innerHTML += `
                <div class="card">
                    <div class="offer-tag">FREE SHIPPING</div>
                    <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=300" alt="perfume">
                    <h3 style="font-size:12px; margin:5px 0;">${p.name}</h3>
                    <div class="price"><span class="old">₹${p.old}</span> <span class="new">₹${p.price}</span></div>
                    <div class="urgency">⚡ Only ${Math.floor(Math.random()*4)+2} left</div>
                    <select id="qP${i}"><option value="1">1 Qty</option><option value="2">2 Qty</option></select>
                    <button onclick="openOrder('${p.name}', ${p.price}, 'qP${i}')">Order</button>
                </div>`;
            });

            const cDiv = document.getElementById('comboPage');
            combos.forEach((c, i) => {
                cDiv.innerHTML += `
                <div class="card">
                    <div class="offer-tag">COD</div>
                    <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=300" alt="combo">
                    <h3 style="font-size:12px; margin:5px 0;">${c.name}</h3>
                    <div class="price"><span class="old">₹${c.old}</span> <span class="new">₹${c.price}</span></div>
                    <select id="qC${i}"><option value="1">1 Combo</option><option value="2">2 Combo</option></select>
                    <button onclick="openOrder('${c.name}', ${c.price}, 'qC${i}')">Order</button>
                </div>`;
            });
        }

        function openOrder(name, price, qId) {
            sProduct = name; sPrice = price; sQty = document.getElementById(qId).value;
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('orderPage').style.display = 'block';
            document.getElementById('selectedItemName').innerText = sProduct + " (Qty: " + sQty + ")";
            document.getElementById('totalDisplay').innerText = "Total: ₹" + (sPrice * sQty);
            window.scrollTo(0,0);
        }

        function goBack() {
            document.getElementById('orderPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
        }

        function sendToWhatsApp(e) {
            e.preventDefault();
            const n = document.getElementById('userName').value;
            const ph = document.getElementById('userPhone').value;
            const ad = document.getElementById('userAddress').value;
            const ci = document.getElementById('userCity').value;
            const pi = document.getElementById('userPin').value;
            const msg = `*NEW ORDER RECEIVED*%0A%0A*Item:* ${sProduct}%0A*Qty:* ${sQty}%0A*Total:* ₹${sPrice * sQty}%0A%0A*Name:* ${n}%0A*Phone:* ${ph}%0A*Address:* ${ad}, ${ci} - ${pi}%0A*Delivery:* FREE%0A*Payment:* COD`;
            window.open(`https://wa.me/918739853696?text=${msg}`, '_blank');
        }

        function showPopup() {
            const popup = document.getElementById('salePopup');
            const pNames = ["Arun", "Priya", "Vikram", "Isha", "Kunal", "Deepa"];
            setInterval(() => {
                const name = pNames[Math.floor(Math.random()*pNames.length)];
                popup.innerHTML = `🛍️ <b>${name}</b> just bought ${sProduct || 'a perfume'}!`;
                popup.style.display = 'block';
                setTimeout(() => { popup.style.display = 'none'; }, 4000);
            }, 12000);
        }

        let t = 600;
        setInterval(() => {
            let m = Math.floor(t/60); let s = t % 60;
            document.getElementById('countdown').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(t > 0) t--;
        }, 1000);

        init();
        showPopup();
    </script>
</body>
</html>
