<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Perfume Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:#fff
}

.marquee{
background:#000;
color:#00ffae;
padding:10px;
overflow:hidden
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 10s linear infinite
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

header{
text-align:center;
padding:15px;
font-size:24px;
font-weight:600
}

.timer{
text-align:center;
background:#ff4d4d;
padding:10px;
font-weight:600
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px
}

@media(max-width:500px){
.products{grid-template-columns:1fr;}
}

.card{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
text-align:center;
position:relative;
transition:0.3s;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px)}
to{opacity:1; transform:translateY(0)}
}

.card:hover{transform:translateY(-3px)}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px
}

.price{margin:6px 0}
.old{text-decoration:line-through;color:#aaa}
.new{color:#00ffae;font-weight:600}

button{
background:linear-gradient(45deg,#00ffae,#00cfff);
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
margin-top:5px;
font-weight:600;
color:#000;
}

select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px
}

.badge{
position:absolute;
top:5px;
right:5px;
background:#00ffae;
color:#000;
padding:3px 6px;
font-size:10px;
border-radius:5px
}

.section-title{text-align:center;margin-top:15px}
.urgency{color:#ff4d4d;font-size:12px}

.orderPage{display:none;padding:15px}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px
}

.trust{text-align:center;margin:10px;font-size:13px}

.backBtn{background:#fff;color:#000;margin-bottom:10px}

/* REVIEW */
.review-slider{overflow:hidden}
.review-track{
display:flex;
animation:scrollReviews 20s linear infinite
}
.review-box{
min-width:200px;
margin:10px;
background:#111;
padding:10px;
border-radius:10px
}

@keyframes scrollReviews{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#000;
padding:10px 15px;
border-radius:10px;
color:#00ffae;
font-size:13px;
display:none;
}
</style>
</head>

<body>

<div class="marquee">
<span>🔥 Buy 2 Get 1 Free | Free Delivery | Limited Stock 🔥</span>
</div>

<header>Luxury Perfume Store</header>

<div class="timer">⏳ Offer Ends In: <span id="countdown">10:00</span></div>

<div class="trust">
⭐ 4.8 Rating | 🚚 Free Delivery | 🔥 5000+ Happy Customers
</div>

<h2 class="section-title">🧴 Premium Perfumes</h2>
<section id="productPage" class="products"></section>

<section id="orderPage" class="orderPage">
<button class="backBtn" onclick="goBack()">⬅ Back</button>
<h2>Complete Your Order</h2>

<form onsubmit="submitForm(event)">
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" pattern="[0-9]{10}" required>
<input id="address" placeholder="Full Address" required>
<input id="city" placeholder="City" required>
<input id="pincode" placeholder="Pincode" required>

<input id="selectedProduct" readonly>
<input id="selectedQty" readonly>
<input id="totalPrice" readonly>

<button type="submit">Confirm Order (COD)</button>
</form>
</section>

<div id="popup" class="popup"></div>

<script>

let perfumes=[
{name:"Royal Oud",price:799},
{name:"Midnight Musk",price:899},
{name:"Fresh Citrus",price:699},
{name:"Dark Night",price:999}
];

let priceMap={};
let container=document.getElementById('productPage');

perfumes.forEach((p,i)=>{
priceMap[p.name]=p.price;

let stock=Math.floor(Math.random()*3)+2;

container.innerHTML+=`
<div class="card">
<img src="https://source.unsplash.com/400x400/?perfume,${p.name}">
<h3>${p.name}</h3>
<div class="price"><span class="new">₹${p.price}</span></div>
<div class="urgency">⚡ Only ${stock} left</div>
<select id="p${i}"><option>1</option><option>2</option><option>3</option></select>
<button onclick="openForm('${p.name}','p${i}')">Order Now</button>
</div>`;
});

function openForm(product,qtyId){
let qty=document.getElementById(qtyId).value;

document.getElementById('productPage').style.display='none';
document.getElementById('orderPage').style.display='block';

document.getElementById('selectedProduct').value=product;
document.getElementById('selectedQty').value=qty;

let total=priceMap[product]*qty;
document.getElementById('totalPrice').value="Total: ₹"+total;

window.scrollTo(0,0);
}

function goBack(){
document.getElementById('orderPage').style.display='none';
document.getElementById('productPage').style.display='grid';
}

function submitForm(e){
e.preventDefault();

let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let city=document.getElementById('city').value;
let pincode=document.getElementById('pincode').value;
let product=document.getElementById('selectedProduct').value;
let qty=document.getElementById('selectedQty').value;

let number="918739853696";

let msg=`🛒 *NEW ORDER* %0A
👤 Name: ${name} %0A
📞 Phone: ${phone} %0A
📍 Address: ${address}, ${city} - ${pincode} %0A
🧴 Product: ${product} %0A
📦 Quantity: ${qty} %0A
💰 Payment: COD`;

window.open(`https://wa.me/${number}?text=${msg}`,'_blank');
}

</script>

</body>
</html>
