<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Perfume Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f0f;color:#fff}
header{text-align:center;padding:15px;font-size:24px}
.products{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;padding:15px}
@media(max-width:1000px){.products{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.products{grid-template-columns:repeat(2,1fr)}}
.card{background:#1a1a1a;padding:10px;border-radius:10px;text-align:center}
.card img{width:100%;height:220px;object-fit:cover;border-radius:10px}
button{background:#00ffae;border:none;padding:8px;border-radius:6px;margin-top:5px}
select{margin-top:5px}
.orderPage,.thankyou{display:none;padding:20px}
input{width:100%;padding:10px;margin:5px 0}
</style>
</head>
<body>

<header>Luxury Perfume Store</header>

<section id="productPage" class="products"></section>

<section id="orderPage" class="orderPage">
<h2>Complete Order</h2>
<form onsubmit="submitForm(event)">
<input id="name" placeholder="Name" required>
<input id="phone" placeholder="Phone" required>
<input id="address" placeholder="Address" required>
<input id="city" placeholder="City" required>
<input id="state" placeholder="State" required>
<input id="pincode" placeholder="Pincode" required>
<input id="selectedProduct" readonly>
<input id="selectedQty" readonly>
<button type="submit">Confirm</button>
</form>
</section>

<section id="thankyou" class="thankyou">
<h2>Order Confirmed</h2>
<p>We will call you soon</p>
<button onclick="location.reload()">Shop More</button>
</section>

<script>
let perfumes=[
"Royal Oud","Midnight Musk","Fresh Citrus","Dark Night","Ocean Breeze",
"Golden Spice","Royal Rose","Ice Cool","Black Oud","Silver Mist",
"Aqua Fresh","Night King","White Musk","Red Rose","Blue Wave",
"Spicy Oud","Cool Mint","Urban Man","Wild Stone","Luxury Gold"
];

let container=document.getElementById('productPage');

// CLEAR FIRST
container.innerHTML="";

perfumes.forEach((p,i)=>{
let div=document.createElement('div');
div.className="card";
div.innerHTML=`
<img src="https://source.unsplash.com/400x400/?perfume,${i}">
<h3>${p}</h3>
<select id="q${i}">
<option>1</option>
<option>2</option>
</select>
<button onclick="openForm('${p}','q${i}')">Order COD</button>
`;
container.appendChild(div);
});

function openForm(product,id){
let qty=document.getElementById(id).value;
document.getElementById('productPage').style.display='none';
document.getElementById('orderPage').style.display='block';
document.getElementById('selectedProduct').value=product;
document.getElementById('selectedQty').value=qty;
}

function submitForm(e){
e.preventDefault();
document.getElementById('orderPage').style.display='none';
document.getElementById('thankyou').style.display='block';
let number="91XXXXXXXXXX";
window.open(`https://wa.me/${number}?text=New Order`,'_blank');
}
</script>

</body>
</html>
