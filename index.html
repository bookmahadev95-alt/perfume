<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Aroma | Animated Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); 
            --solid-gold: #D4AF37;
            --dark-bg: #050505;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; scroll-behavior: smooth; }
        body { background: var(--dark-bg); color:#fff; overflow-x:hidden; position: relative; }

        /* --- BACKGROUND ANIMATED ORBS --- */
        body::before, body::after {
            content: ''; position: fixed; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: -1; animation: floatOrbs 20s infinite alternate;
        }
        body::after { right: -100px; bottom: -100px; animation-delay: -5s; }
        @keyframes floatOrbs { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 100px); } }

        /* Announcement Bar */
        .marquee { background:#000; color:#00ffae; padding:12px; overflow:hidden; white-space:nowrap; border-bottom:1px solid #1a1a1a; font-size: 11px; letter-spacing: 2px; }
        .marquee span { display:inline-block; animation:scroll 20s linear infinite; text-transform: uppercase; }
        @keyframes scroll { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }

        /* Luxury Header Animation */
        header { 
            text-align:center; padding:50px 20px 30px; 
            font-family: 'Playfair Display', serif;
            font-size:38px; background: var(--gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 8px; animation: titleFade 1.5s ease-out;
        }
        @keyframes titleFade { from { opacity:0; letter-spacing: 20px; transform: translateY(-20px); } to { opacity:1; letter-spacing: 8px; transform: translateY(0); } }

        /* WhatsApp Animated */
        .wa-float { 
            position: fixed; bottom: 30px; right: 20px; background: #25D366; 
            width: 55px; height: 55px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; z-index: 1000;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); animation: pulseWA 2s infinite;
        }
        @keyframes pulseWA { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        /* Sales Popup */
        #sale-popup {
            position: fixed; bottom: 100px; left: 15px; background: rgba(0,0,0,0.95); color: #fff;
            padding: 15px 20px; border-radius: 4px; border-left: 4px solid var(--solid-gold);
            display: none; z-index: 1001; font-size: 11px; box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes slideUp { from { opacity:0; transform: translateY(50px); } to { opacity:1; transform: translateY(0); } }

        /* Grid & Cards */
        .products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        
        .card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px 15px; border-radius: 2px; 
            text-align:center; position:relative; overflow: hidden;
            opacity: 0; transform: translateY(30px); transition: 0.6s all ease;
        }
        /* Reveal animation trigger class */
        .reveal { opacity: 1; transform: translateY(0); }
        
        .card:active { transform: scale(0.95); border-color: var(--solid-gold); }
        .card img { width:100%; height:150px; object-fit:contain; transition: 0.5s; filter: brightness(0.9); }
        .card:hover img { transform: scale(1.1) rotate(3deg); filter: brightness(1.1); }
        
        .price { color: var(--solid-gold); font-size: 18px; font-weight: 600; margin: 12px 0; display: block; }
        
        .btn-luxe { 
            background: var(--gold); border:none; padding:14px; 
            cursor:pointer; width:100%; font-weight:700; color:#000; 
            text-transform: uppercase; font-size: 10px; letter-spacing: 2px;
            position: relative; overflow: hidden;
        }
        .btn-luxe::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

        /* Order Page Transition */
        .orderPage { display:none; padding:40px 20px; animation: pageIn 0.5s ease-out; }
        @keyframes pageIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        input { 
            width:100%; padding:18px; margin:12px 0; border: 1px solid #222; 
            background:transparent; color:#fff; border-bottom: 2px solid #333; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--solid-gold); outline: none; background: rgba(212,175,55,0.05); }

        .trust-section { display: flex; overflow: hidden; background: #000; padding: 20px 0; margin-bottom: 20px; border-bottom: 1px solid #111; }
        .trust-item { min-width: 50%; text-align: center; font-size: 10px; letter-spacing: 1px; color: #888; border-right: 1px solid #222; }
        .trust-item b { color: var(--solid-gold); display: block; font-size: 12px; }
    </style>
</head>
<body>

    <a href="https://wa.me/918739853696" class="wa-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:30px;" alt="WA">
    </a>

    <div id="sale-popup"></div>

    <div class="marquee">
        <span>💎 Limited Edition Fragrances | Pay on Delivery | 24-Hour Intense Sillage | Free Shipping 💎</span>
    </div>

    <header>LUXE AROMA</header>

    <div class="trust-section">
        <div class="trust-item"><b>EXPRESS</b> DELIVERY</div>
        <div class="trust-item" style="border:none"><b>PREMIUM</b> QUALITY</div>
    </div>

    <div id="homePage">
        <section id="productPage" class="products"></section>
        
        <h2 style="text-align:center; font-family:'Playfair Display'; color:var(--solid-gold); margin:40px 0 10px; letter-spacing:3px;">EXCLUSIVE COMBOS</h2>
        <section id="comboPage" class="products"></section>

        <div style="height: 100px;"></div> </div>

    <section id="orderPage" class="orderPage">
        <p style="text-align: center; cursor: pointer; color: var(--solid-gold); margin-bottom: 40px; letter-spacing: 3px; font-size: 12px;" onclick="goBack()">← RETURN TO GALLERY</p>
        <div style="border: 1px solid #222; padding: 30px; text-align: center; margin-bottom: 30px; background: #080808;">
            <h3 id="selectedItemName" style="font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 2px;"></h3>
            <p id="totalDisplay" style="color: var(--solid-gold); font-size: 26px; font-weight: bold; margin-top: 10px;"></p>
        </div>
        <form onsubmit="sendToWhatsApp(event)">
            <input id="userName" placeholder="CLIENT NAME" required>
            <input id="userPhone" type="tel" placeholder="CONTACT NUMBER" required>
            <input id="userAddress" placeholder="SHIPPING ADDRESS" required>
            <input id="userCity" placeholder="CITY" required>
            <input id="userPin" type="number" placeholder="ZIP CODE" required>
            <button type="submit" class="btn-luxe" style="margin-top: 30px; padding: 20px;">CONFIRM ACQUISITION</button>
        </form>
    </section>

    <script>
        const perfumes = [
            {name:"Royal Oud", price:799}, {name:"Midnight Musk", price:899},
            {name:"Ocean Blue", price:749}, {name:"Fresh Citrus", price:699},
            {name:"Dark Night", price:999}, {name:"Golden Sand", price:849},
            {name:"Silver Mist", price:699}, {name:"Black Leather", price:1099},
            {name:"White Jasmine", price:799}, {name:"Velvet Rose", price:899}
        ];

        function init() {
            const pDiv = document.getElementById('productPage');
            const cDiv = document.getElementById('comboPage');
            
            perfumes.forEach((p) => {
                pDiv.innerHTML += createCard(p, "https://images.unsplash.com/photo-1541643600914-78b084683601?w=400");
                cDiv.innerHTML += createCard({...p, name: p.name + " Combo", price: p.price + 500}, "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400");
            });

            // Trigger scroll reveal
            window.addEventListener('scroll', revealCards);
            revealCards(); // Run once for top items
        }

        function createCard(item, img) {
            return `
                <div class="card">
                    <img src="${img}">
                    <h3 style="font-size:10px; letter-spacing:2px; margin-top:15px; font-weight:300;">${item.name.toUpperCase()}</h3>
                    <span class="price">₹${item.price}</span>
                    <button class="btn-luxe" onclick="openOrder('${item.name}', ${item.price})">Acquire</button>
                </div>`;
        }

        function revealCards() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const cardTop = card.getBoundingClientRect().top;
                if(cardTop < window.innerHeight - 50) {
                    card.classList.add('reveal');
                }
            });
        }

        let curN = "", curP = 0;
        function openOrder(n, p) {
            curN = n; curP = p;
            document.getElementById('homePage').style.display='none';
            document.getElementById('orderPage').style.display='block';
            document.getElementById('selectedItemName').innerText = n.toUpperCase();
            document.getElementById('totalDisplay').innerText = "₹" + p;
            window.scrollTo(0,0);
            history.pushState({page: "checkout"}, "Checkout", "#checkout");
        }

        function goBack() { 
            if(window.location.hash === "#checkout") { history.back(); } 
            else { showHome(); }
        }

        function showHome() {
            document.getElementById('orderPage').style.display='none';
            document.getElementById('homePage').style.display='block';
            setTimeout(revealCards, 100); // Re-trigger reveal on return
        }

        window.onpopstate = function() { showHome(); };

        function sendToWhatsApp(e) {
            e.preventDefault();
            const msg = `*LUXURY ORDER*%0A*Item:* ${curN}%0A*Total:* ₹${curP}%0A*Client:* ${document.getElementById('userName').value}%0A*Address:* ${document.getElementById('userAddress').value}%0A*Status:* COD`;
            window.open(`https://wa.me/918739853696?text=${msg}`);
        }

        function showSalePopup() {
            const popup = document.getElementById('sale-popup');
            const names = ["Mr. Khanna", "Aman V.", "Mrs. Joshi", "S. Rathore", "Rohan M."];
            setInterval(() => {
                const name = names[Math.floor(Math.random()*names.length)];
                popup.innerHTML = `⚜️ <b>${name}</b> just ordered a Signature Fragrance.`;
                popup.style.display = 'block';
                setTimeout(() => { popup.style.display = 'none'; }, 3500);
            }, 6000);
        }

        init();
        showSalePopup();
    </script>
</body>
</html>
