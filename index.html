<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Perfume - Limited Offer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:#0f0f0f;
color:#fff;
}

/* HERO */
.hero{
text-align:center;
padding:20px;
}

.hero img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
}

.title{
font-size:22px;
margin-top:10px;
font-weight:600;
}

.price{
margin:10px 0;
}

.old{color:#aaa;text-decoration:line-through}
.new{color:#00ffae;font-size:22px;font-weight:600}

/* TIMER */
.timer{
color:#ff4d4d;
text-align:center;
margin:10px;
font-weight:600;
}

/* BUTTON */
.btn{
background:#00ffae;
color:#000;
padding:12px;
border:none;
width:100%;
border-radius:10px;
font-size:16px;
font-weight:600;
margin-top:10px;
cursor:pointer;
}

/* TRUST */
.trust{
text-align:center;
margin:15px;
font-size:14px;
}

/* REVIEWS */
.reviews{
padding:10px;
}

.review-card{
background:#1c1c1c;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

/* STICKY BUTTON */
.sticky{
position:fixed;
bottom:0;
width:100%;
background:#000;
padding:10px;
}

/* FORM */
.order{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<img src="https://source.unsplash.com/600x400/?perfume,luxury">

<div class="title">🔥 Premium Long Lasting Perfume</div>

<div class="price">
<span class="old">₹1999</span>
<span class="new">₹799</span>
</div>

<div class="timer">⏳ Offer Ends Soon | Only 5 Left</div>

<button class="btn" onclick="openForm()">Order Now</button>
</div>

<div class="trust">
🚚 Free Delivery | 💵 Cash on Delivery | 🔒 Secure Order
</div>

<!-- REVIEWS -->
<div class="reviews">
<h3>⭐ Customer Reviews</h3>

<div class="review-card">🔥 Smell bahut premium hai, long lasting! – Rahul</div>
<div class="review-card">😍 Best perfume in this price – Aman</div>
<div class="review-card">💯 Delivery fast aur packaging top – Suresh</div>

</div>

<!-- ORDER FORM -->
<div id="orderPage" class="order">

<h2>Complete Your Order</h2>

<form onsubmit="submitForm(event)">
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" pattern="[0-9]{10}" required>
<input id="address" placeholder="Full Address" required>
<input id="city" placeholder="City" required>
<input id="pincode" placeholder="Pincode" required>

<button class="btn">Confirm Order (COD)</button>
</form>

</div>

<!-- STICKY BUTTON -->
<div class="sticky">
<button class="btn" onclick="openForm()">🔥 Order Now ₹799</button>
</div>

<script>

function openForm(){
document.getElementById('orderPage').style.display='block';
window.scrollTo(0,document.body.scrollHeight);
}

function submitForm(e){
e.preventDefault();

let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let city=document.getElementById('city').value;
let pincode=document.getElementById('pincode').value;

let number="918739853696";

let msg=`COD Order:%0AName:${name}%0APhone:${phone}%0AAddress:${address}%0ACity:${city}%0APincode:${pincode}%0AProduct:Premium Perfume`;

window.open(`https://wa.me/${number}?text=${msg}`,'_blank');
}

</script>

</body>
</html>
