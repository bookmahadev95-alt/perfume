<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Perfume Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:#fff
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px
}

.marquee{
background:#000;
color:#00ffae;
padding:10px;
overflow:hidden;
white-space:nowrap;
}

.marquee span{
display:inline-block;
animation:scroll 8s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

header{text-align:center;padding:15px;font-size:24px;font-weight:600}

.timer{text-align:center;background:#ff4d4d;padding:10px;font-weight:600}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:12px;
border-radius:16px;
text-align:center;
transition:0.3s;
box-shadow:0 0 15px rgba(0,255,174,0.1);
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(0,255,174,0.4);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px
}

.price{margin:6px 0}
.old{text-decoration:line-through;color:#aaa}
.new{color:#00ffae;font-weight:600}

button{
background:linear-gradient(45deg,#00ffae,#00cfff);
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
margin-top:5px;
font-weight:600;
color:#000;
}

select,input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
}

.section-title{text-align:center;margin-top:15px}

.orderPage{display:none;padding:15px}

/* ⭐ PREMIUM REVIEWS DESIGN */
.review-slider{overflow:hidden}
.review-track{display:flex;animation:scrollReviews 25s linear infinite}

@keyframes scrollReviews{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.review-box{
min-width:220px;
margin:10px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
padding:12px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,255,174,0.2);
transition:0.3s;
}

.review-box:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(0,255,174,0.5);
}

.backBtn{background:#fff;color:#000;margin-bottom:10px}
</style>
</head>

<body>

<div class="marquee">
<span>🔥 Buy 2 Get 1 Free | Free Delivery | Limited Stock 🔥</span>
</div>

<header>Luxury Perfume Store</header>

<div class="timer">⏳ Offer Ends Soon</div>

<h2 class="section-title">🧴 Premium Perfumes</h2>
<section id="productPage" class="products"></section>

<!-- ORDER PAGE -->
<section id="orderPage" class="orderPage">
<button class="backBtn" onclick="goBack()">⬅ Back</button>

<h2>Complete Your Order</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Mobile Number">
<input id="address" placeholder="Address">

<input id="selectedProduct" readonly>
<input id="selectedQty" readonly>
<input id="totalPrice" readonly>

<button onclick="submitForm()">Confirm Order</button>

<!-- ⭐ REVIEW SYSTEM -->
<h2 class="section-title">⭐ Customer Reviews</h2>

<input id="reviewName" placeholder="Your Name">
<select id="reviewRating">
<option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>
<option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>
<option value="⭐⭐⭐">⭐⭐⭐</option>
</select>
<input id="reviewText" placeholder="Write review">
<button onclick="addReview()">Submit Review</button>

<div class="review-slider">
<div class="review-track" id="reviewTrack"></div>
</div>

</section>

<script>

let perfumes=[
{name:"Royal Oud",price:799},
{name:"Midnight Musk",price:899},
{name:"Fresh Citrus",price:699},
{name:"Dark Night",price:999}
];

let priceMap={};

let container=document.getElementById('productPage');

perfumes.forEach((p,i)=>{
priceMap[p.name]=p.price;

container.innerHTML+=`
<div class="card">
<img src="https://source.unsplash.com/400x400/?perfume,${p.name}">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<select id="p${i}"><option>1</option><option>2</option></select>
<button onclick="openForm('${p.name}','p${i}')">Order</button>
</div>`;
});

function openForm(product,qtyId){
let qty=document.getElementById(qtyId).value;

document.getElementById('productPage').style.display='none';
document.getElementById('orderPage').style.display='block';

document.getElementById('selectedProduct').value=product;
document.getElementById('selectedQty').value=qty;
document.getElementById('totalPrice').value="₹"+(priceMap[product]*qty);
}

function goBack(){
document.getElementById('orderPage').style.display='none';
document.getElementById('productPage').style.display='grid';
}

function submitForm(){
alert("Order placed!");
}

/* ⭐ REVIEWS SYSTEM */

let defaultReviews=[
"Awesome perfume 🔥 - Rahul ⭐⭐⭐⭐⭐",
"Best quality 😍 - Aman ⭐⭐⭐⭐⭐",
"Long lasting 💯 - Neha ⭐⭐⭐⭐"
];

function loadReviews(){
let saved=JSON.parse(localStorage.getItem("reviews"))||defaultReviews;
let track=document.getElementById("reviewTrack");
track.innerHTML="";
saved.forEach(r=>{
track.innerHTML+=`<div class="review-box">${r}</div>`;
});
}

function addReview(){
let name=document.getElementById("reviewName").value;
let rating=document.getElementById("reviewRating").value;
let text=document.getElementById("reviewText").value;

if(!name||!text){alert("Fill all fields");return;}

let newReview=`${text} - ${name} ${rating}`;

let saved=JSON.parse(localStorage.getItem("reviews"))||defaultReviews;
saved.push(newReview);
localStorage.setItem("reviews",JSON.stringify(saved));

loadReviews();

document.getElementById("reviewName").value="";
document.getElementById("reviewText").value="";
}

/* 🔥 AUTO REVIEWS */
setInterval(()=>{
let names=["Rohit","Aman","Priya","Karan"];
let texts=["Amazing 🔥","Loved it 😍","Worth price","Best perfume"];

let random=`${texts[Math.floor(Math.random()*texts.length)]} - ${names[Math.floor(Math.random()*names.length)]} ⭐⭐⭐⭐⭐`;

let saved=JSON.parse(localStorage.getItem("reviews"))||[];
saved.push(random);
localStorage.setItem("reviews",JSON.stringify(saved));

loadReviews();

},7000);

loadReviews();

</script>

</body>
</html>
