<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Aroma | Premium Perfumes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --accent: #00ffae; --dark: #0f0f0f; --wa-green: #25D366; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: #0f0f0f; color:#fff; overflow-x:hidden; }

        /* Announcement Bar */
        .marquee { background:#000; color:var(--accent); padding:10px; overflow:hidden; white-space:nowrap; border-bottom:1px solid var(--gold); font-size: 13px; }
        .marquee span { display:inline-block; animation:scroll 15s linear infinite; font-weight:600; }
        @keyframes scroll { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }

        header { text-align:center; padding:20px; font-size:28px; font-weight:600; color:var(--gold); letter-spacing:2px; text-transform: uppercase; }

        /* Official WhatsApp Icon */
        .wa-float { 
            position: fixed; bottom: 80px; right: 20px; background: var(--wa-green); 
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.4); 
            z-index: 1000; text-decoration: none; border: 2px solid #fff;
        }
        .wa-icon { width: 35px; height: 35px; }

        /* Live Sales Popup (5 Sec) */
        #sale-popup {
            position: fixed; bottom: 20px; left: 15px; background: #fff; color: #000;
            padding: 12px 18px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: none; z-index: 1001; font-size: 11px; border-left: 6px solid var(--wa-green);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 85%; line-height: 1.4;
        }
        @keyframes slideIn { from { transform: translateX(-120%); } to { transform: translateX(0); } }

        /* Layout (2 Products Per Row) */
        .products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background:rgba(255,255,255,0.03); border:1px solid rgba(212, 175, 55, 0.2); padding:10px; border-radius:15px; text-align:center; }
        .card img { width:100%; height:130px; object-fit:cover; border-radius:10px; }
        
        .price { color:var(--accent); font-weight:600; font-size:16px; margin: 5px 0; display: block; }
        button { background:linear-gradient(45deg, var(--gold), #f3e092); border:none; padding:10px; border-radius:10px; cursor:pointer; width:100%; font-weight:700; color:#000; text-transform: uppercase; font-size: 11px; }

        .orderPage { display:none; padding:20px; max-width: 500px; margin: auto; }
        input { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid #333; background:#222; color:#fff; }

        .trust-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .trust-box { background: #111; padding: 10px; border-radius: 8px; text-align: center; font-size: 9px; border: 1px solid #222; }
        .trust-box b { color: var(--gold); display: block; margin-bottom: 2px; }

        /* Reviews Styling */
        .review-container { padding: 20px 0; background: rgba(0,0,0,0.3); }
        .review-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px; scrollbar-width: none; }
        .review-scroll::-webkit-scrollbar { display: none; }
        .review-box { min-width: 250px; background: #1a1a1a; padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); font-size: 12px; }
        .stars { color: var(--gold); margin-bottom: 5px; }
        .rev-name { font-weight: 600; font-size: 13px; color: var(--accent); display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <a href="https://wa.me/918739853696" class="wa-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-icon" alt="WhatsApp">
    </a>

    <div id="sale-popup"></div>

    <div class="marquee">
        <span>🔥 FREE SHIPPING | CASH ON DELIVERY (COD) | ALL INDIA DELIVERY | BUY 2 GET 1 FREE 🔥</span>
    </div>

    <header>Luxe Aroma</header>

    <div class="trust-section">
        <div class="trust-box"><b>🚚 FREE</b> SHIPPING</div>
        <div class="trust-box"><b>💵 COD</b> AVAILABLE</div>
        <div class="trust-box"><b>🇮🇳 PAN</b> INDIA</div>
        <div class="trust-box"><b>✨ 24H</b> LONG LASTING</div>
    </div>

    <div id="homePage">
        <h2 style="text-align: center; color: var(--gold); font-size: 16px; margin: 10px 0;">🧴 PREMIUM COLLECTION</h2>
        <section id="productPage" class="products"></section>

        <h2 style="text-align: center; color: var(--gold); font-size: 16px; margin: 20px 0;">🎁 BEST SAVER COMBOS</h2>
        <section id="comboPage" class="products"></section>

        <h2 style="text-align: center; color: var(--gold); font-size: 16px; margin: 25px 0 5px;">⭐ CUSTOMER FEEDBACK</h2>
        <div class="review-container">
            <div class="review-scroll" id="reviewTrack">
                </div>
        </div>
    </div>

    <section id="orderPage" class="orderPage">
        <button style="background: none; border: 1px solid var(--gold); color: var(--gold); width: auto; padding: 5px 15px; margin-bottom: 15px; border-radius: 5px; cursor: pointer;" onclick="goBack()">← Back</button>
        <div style="background:rgba(212, 175, 55, 0.1); padding:15px; border-radius:12px; border: 1px dashed var(--gold); margin-bottom: 15px;">
            <p id="selectedItemName" style="font-weight: bold;"></p>
            <p id="totalDisplay" style="font-size: 22px; color: var(--accent); font-weight: bold;"></p>
            <p style="font-size: 10px; color: #aaa;">Delivery: FREE SHIPPING Applied ✓</p>
        </div>
        <form onsubmit="sendToWhatsApp(event)">
            <input id="userName" placeholder="Aapka Naam" required>
            <input id="userPhone" type="tel" placeholder="Mobile Number" required>
            <input id="userAddress" placeholder="Address (Ghar No, Area)" required>
            <input id="userCity" placeholder="City" required>
            <input id="userPin" type="number" placeholder="Pincode" required>
            <button type="submit">Order Confirm Karein (COD)</button>
        </form>
    </section>

    <script>
        const perfumes = [
            {name:"Royal Oud", price:799}, {name:"Midnight Musk", price:899},
            {name:"Ocean Blue", price:749}, {name:"Fresh Citrus", price:699},
            {name:"Dark Night", price:999}, {name:"Golden Sand", price:849},
            {name:"Silver Mist", price:699}, {name:"Black Leather", price:1099},
            {name:"White Jasmine", price:799}, {name:"Velvet Rose", price:899}
        ];

        const combos = [
            {name:"Couple Special", price:1299}, {name:"Luxury Trio", price:1599},
            {name:"Party Pack", price:1999}, {name:"Gifting Kit", price:1399},
            {name:"Travel Mini", price:999}, {name:"His & Her", price:1449},
            {name:"Weekend Vibes", price:1199}, {name:"Office Pack", price:1699},
            {name:"Royal Combo", price:1499}, {name:"Ultimate Gift", price:2499}
        ];

        const reviewsData = [
            {name: "Rahul Verma", city: "Delhi", text: "Royal Oud smells very expensive. Best quality ever!"},
            {name: "Sneha Kapoor", city: "Mumbai", text: "Combo pack was the best gift for my brother."},
            {name: "Vikram Singh", city: "Jaipur", text: "Fast delivery and great packaging. 10/10."},
            {name: "Aman Deep", city: "Punjab", text: "Long lasting khushbu hai, office ke liye best hai."},
            {name: "Pooja Rao", city: "Bangalore", text: "Skin friendly product. Midnight Musk is my fav."},
            {name: "Karan Joshi", city: "Pune", text: "Free shipping and fast delivery. Very satisfied."},
            {name: "Neha Gupta", city: "Lucknow", text: "Value for money. Branded perfumes jaisi quality."},
            {name: "Sumit Malik", city: "Haryana", text: "Ocean Blue smells very fresh. Perfect for summers."},
            {name: "Rohit Das", city: "Kolkata", text: "COD delivery was smooth. Good experience."},
            {name: "Jatin", city: "Assam", text: "Got it in 4 days. Fragrance is very premium."}
        ];

        function init() {
            const pDiv = document.getElementById('productPage');
            perfumes.forEach((p, i) => {
                pDiv.innerHTML += `
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=300">
                    <h3 style="font-size:11px; margin-top:5px;">${p.name}</h3>
                    <span class="price">₹${p.price}</span>
                    <button onclick="openOrder('${p.name}', ${p.price})">Order</button>
                </div>`;
            });

            const cDiv = document.getElementById('comboPage');
            combos.forEach((c) => {
                cDiv.innerHTML += `
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=300">
                    <h3 style="font-size:11px; margin-top:5px;">${c.name}</h3>
                    <span class="price">₹${c.price}</span>
                    <button onclick="openOrder('${c.name}', ${c.price})">Buy Combo</button>
                </div>`;
            });

            const revTrack = document.getElementById('reviewTrack');
            reviewsData.forEach(r => {
                revTrack.innerHTML += `
                <div class="review-box">
                    <div class="stars">⭐⭐⭐⭐⭐</div>
                    "${r.text}"
                    <span class="rev-name">- ${r.name}, ${r.city}</span>
                </div>`;
            });
        }

        let curN = "", curP = 0;

        function openOrder(n, p) {
            curN = n; curP = p;
            document.getElementById('homePage').style.display='none';
            document.getElementById('orderPage').style.display='block';
            document.getElementById('selectedItemName').innerText = n;
            document.getElementById('totalDisplay').innerText = "Total: ₹" + p;
            window.scrollTo(0,0);

            // History step for mobile back button fix
            history.pushState({page: "checkout"}, "Checkout", "#checkout");
        }

        function goBack() { 
            if(window.location.hash === "#checkout") {
                history.back(); // Trigger onpopstate
            } else {
                showHome();
            }
        }

        function showHome() {
            document.getElementById('orderPage').style.display='none';
            document.getElementById('homePage').style.display='block';
        }

        // Back Button Fix
        window.onpopstate = function(event) {
            showHome();
        };

        function sendToWhatsApp(e) {
            e.preventDefault();
            const n = document.getElementById('userName').value;
            const ph = document.getElementById('userPhone').value;
            const ad = document.getElementById('userAddress').value;
            const msg = `*NEW ORDER (COD)*%0A*Item:* ${curN}%0A*Total:* ₹${curP}%0A*Customer:* ${n}%0A*Phone:* ${ph}%0A*Address:* ${ad}%0A*Delivery:* FREE SHIPPING`;
            window.open(`https://wa.me/918739853696?text=${msg}`);
        }

        function showSalePopup() {
            const popup = document.getElementById('sale-popup');
            const names = ["Rahul", "Anjali", "Vikram", "Sneha", "Karan", "Pooja", "Sumit"];
            const cities = ["Delhi", "Mumbai", "Jaipur", "Lucknow", "Pune", "Patna"];
            
            setInterval(() => {
                const name = names[Math.floor(Math.random()*names.length)];
                const city = cities[Math.floor(Math.random()*cities.length)];
                popup.innerHTML = `🛍️ <b>${name}</b> from <b>${city}</b><br>Just ordered via COD!`;
                popup.style.display = 'block';
                setTimeout(() => { popup.style.display = 'none'; }, 3000);
            }, 5000); 
        }

        init();
        showSalePopup();
    </script>
</body>
</html>
