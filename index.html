<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Perfume Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f0f;color:#fff}
.marquee{background:#000;color:#00ffae;padding:10px;overflow:hidden;white-space:nowrap}
.marquee span{display:inline-block;padding-left:100%;animation:scroll 12s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
header{text-align:center;padding:15px;font-size:26px;font-weight:600}
.hero{text-align:center;padding:30px 20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:15px;padding:20px}
.card{background:#1a1a1a;padding:12px;border-radius:12px;text-align:center;position:relative}
.stock{position:absolute;top:8px;left:8px;background:red;padding:4px 8px;border-radius:6px;font-size:11px}
.card img{width:100%;border-radius:10px;height:180px;object-fit:cover}
.price{margin:8px 0}
.old{text-decoration:line-through;color:#888}
.new{color:#00ffae;font-weight:600}
button{background:#00ffae;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;margin:4px}
select{padding:6px;border-radius:6px;margin-top:5px}
.section-title{text-align:center;font-size:22px;margin-top:20px}
footer{text-align:center;padding:20px;color:#777}
</style>
</head>
<body>

<div class="marquee"><span>🔥 Luxury Perfume Sale | Buy 2 Get 1 Free | Premium Collection 🔥</span></div>
<header>Luxury Perfume Store</header>

<section class="hero">
<h1>🔥 Premium Perfumes & Combo Offers</h1>
</section>

<h2 class="section-title">🧴 Single Perfumes</h2>
<section class="products">

<!-- 10 Single Perfumes -->

<script>
let perfumes=["Royal Oud","Midnight Musk","Fresh Citrus","Dark Night","Ocean Breeze","Golden Spice","Royal Rose","Ice Cool","Black Oud","Silver Mist"];
let container=document.currentScript.parentElement;
perfumes.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<div class="stock">Only ${Math.floor(Math.random()*5)+2} Left</div>
<img src="https://source.unsplash.com/300x300/?perfume,${i}">
<h3>${p}</h3>
<div class="price"><span class="old">₹1999</span> <span class="new">₹${699+Math.floor(Math.random()*300)}</span></div>
<select id="s${i}"><option>1</option><option>2</option><option>3</option></select>
<button onclick="quickOrder('${p}','s${i}')">Buy Now</button>
<button onclick="payNow('${p}')">Pay</button>
</div>`;
});
</script>

</section>

<h2 class="section-title">🎁 Combo Offers</h2>
<section class="products">

<script>
let combos=["Oud Combo","Musk Combo","Citrus Combo","Night Combo","Ocean Combo","Spice Combo","Rose Combo","Cool Combo","Black Combo","Premium Combo"];
let container2=document.currentScript.parentElement;
combos.forEach((c,i)=>{
container2.innerHTML+=`
<div class="card">
<div class="stock">Only ${Math.floor(Math.random()*5)+2} Left</div>
<img src="https://source.unsplash.com/300x300/?perfume,bottle,${i}">
<h3>${c}</h3>
<div class="price"><span class="old">₹2999</span> <span class="new">₹${999+Math.floor(Math.random()*400)}</span></div>
<select id="c${i}"><option>1</option><option>2</option></select>
<button onclick="quickOrder('${c}','c${i}')">Buy Combo</button>
<button onclick="payNow('${c}')">Pay</button>
</div>`;
});
</script>

</section>

<footer>🚚 Free Delivery | 💵 COD + Online Payment Available</footer>

<script>
function quickOrder(product,id){
let qty=document.getElementById(id).value;
let number="91XXXXXXXXXX";
let msg=`Order:%0AProduct:${product}%0AQuantity:${qty}`;
window.open(`https://wa.me/${number}?text=${msg}`,'_blank');
}

function payNow(product){
window.open("https://rzp.io/l/demo123","_blank");
}
</script>

</body>
</html>
